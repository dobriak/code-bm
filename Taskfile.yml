version: "3"

vars:
  BACKEND_DIR: "backend"
  FRONTEND_DIR: "frontend"
  LIQUIDSOAP_HOST: "127.0.0.1"
  LIQUIDSOAP_TELNET_PORT: "1234"
  ICECAST_HOST: "127.0.0.1"
  ICECAST_PORT: "8000"
  ICECAST_SOURCE_PASSWORD: "hackme"
  ICECAST_MOUNT: "/raidio.mp3"

tasks:
  install:
    desc: "Install all dependencies (backend + frontend)"
    cmds:
      - cd {{.BACKEND_DIR}} && uv sync
      - cd {{.FRONTEND_DIR}} && bun install

  dev:
    desc: "Start all services in parallel"
    cmds:
      - task: dev:backend
      - task: dev:frontend
      - task: dev:liquidsoap
      - task: dev:icecast

  dev:backend:
    desc: "Run FastAPI on :8001"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn raidio.main:app --host 127.0.0.1 --port 8001 --reload

  dev:frontend:
    desc: "Run Vite dev server on :5173"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run dev

  dev:liquidsoap:
    desc: "Start Liquidsoap audio engine (telnet on :1234)"
    dir: "."
    cmds:
      - |
        export LIQUIDSOAP_HOST={{.LIQUIDSOAP_HOST}}
        export LIQUIDSOAP_TELNET_PORT={{.LIQUIDSOAP_TELNET_PORT}}
        export ICECAST_HOST={{.ICECAST_HOST}}
        export ICECAST_PORT={{.ICECAST_PORT}}
        export ICECAST_SOURCE_PASSWORD={{.ICECAST_SOURCE_PASSWORD}}
        export ICECAST_MOUNT={{.ICECAST_MOUNT}}
        mkdir -p tmp
        envsubst < liquidsoap/raidio.liq > tmp/raidio.liq
      - liquidsoap tmp/raidio.liq

  dev:icecast:
    desc: "Start Icecast broadcast server on :8000"
    dir: "."
    cmds:
      - |
        export ICECAST_SOURCE_PASSWORD={{.ICECAST_SOURCE_PASSWORD}}
        export ICECAST_HOST={{.ICECAST_HOST}}
        export ICECAST_PORT={{.ICECAST_PORT}}
        mkdir -p tmp/raidio-logs
        envsubst < liquidsoap/icecast.xml > tmp/raidio-icecast.xml
      - icecast2 -c tmp/raidio-icecast.xml

  test:
    desc: "Run all tests"
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: "Run backend tests with pytest"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest --cov=raidio --cov-report=term-missing

  test:frontend:
    desc: "Run frontend tests with vitest"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run test

  lint:
    desc: "Run all linters"
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: "Run ruff on backend"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  lint:frontend:
    desc: "Run eslint on frontend"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run lint

  format:
    desc: "Auto-format all code"
    cmds:
      - task: format:backend
      - task: format:frontend

  format:backend:
    desc: "Format backend with ruff"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .
      - uv run ruff check --fix .

  format:frontend:
    desc: "Format frontend with prettier"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run format

  db:migrate:
    desc: "Run Alembic migrations"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run alembic -c alembic.ini upgrade head

  db:revision:
    desc: "Create a new Alembic migration"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run alembic -c alembic.ini revision -m "{{.MSG}}"
